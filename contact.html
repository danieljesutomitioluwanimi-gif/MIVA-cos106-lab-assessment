<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Info</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="logo">Student Hub</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="planner.html">Planner</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Get In Touch</h2>
            <form id="submissionForm">
                <input type="text" id="fullName" placeholder="Full Name">
                <input type="text" id="userEmail" placeholder="Email Address">
                <input type="text" id="userPhone" placeholder="Phone Number">
                <textarea id="userMsg" rows="4" placeholder="Type your message here..."></textarea>
                <button type="submit">Send Message</button>
            </form>
            <p id="msgResponse" style="margin-top: 15px; font-weight: bold; color: #dc3545;"></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MIVA Open University. All Rights Reserved.</p>
    </footer>

    <script>
        const formEl = document.getElementById('submissionForm');
        const feedback = document.getElementById('msgResponse');

        formEl.onsubmit = function(e) {
            e.preventDefault();

            const nameVal = document.getElementById('fullName').value.trim();
            const emailVal = document.getElementById('userEmail').value.trim();
            const phoneVal = document.getElementById('userPhone').value.trim();
            const msgVal = document.getElementById('userMsg').value.trim();

            if (nameVal === '' || emailVal === '' || phoneVal === '' || msgVal === '') {
                feedback.style.color = '#dc3545';
                feedback.innerText = 'Please make sure to fill out all the input blocks.';
                return;
            }

            if (emailVal.indexOf('@') === -1 || emailVal.indexOf('.') === -1) {
                feedback.style.color = '#dc3545';
                feedback.innerText = 'The format of the email address is invalid.';
                return;
            }

            let onlyDigits = true;
            for (let i = 0; i < phoneVal.length; i++) {
                if (phoneVal[i] < '0' || phoneVal[i] > '9') {
                    onlyDigits = false;
                    break;
                }
            }

            if (!onlyDigits) {
                feedback.style.color = '#dc3545';
                feedback.innerText = 'The phone records can only contain numeric values.';
                return;
            }

            feedback.style.color = 'green';
            feedback.innerText = 'Thank you! Your information has been recorded successfully.';
            formEl.reset();
        };
    </script>
</body>
</html>
