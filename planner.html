<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Task Planner</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .done {
            text-decoration: line-through;
            color: #777777;
        }
        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fdfdfd;
            border: 1px solid #eeeeee;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 8px;
            border-radius: 4px;
        }
        .task-buttons button {
            padding: 5px 10px;
            font-size: 13px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Student Hub</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="planner.html">Planner</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>My Academic Planner</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="taskInput" placeholder="Write down an academic task...">
                <button id="addBtn">Add Task</button>
            </div>
            <div id="tasksContainer"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MIVA Open University. All Rights Reserved.</p>
    </footer>

    <script>
        let myTasks = [];

        const taskInput = document.getElementById('taskInput');
        const addBtn = document.getElementById('addBtn');
        const tasksContainer = document.getElementById('tasksContainer');

        function displayTasks() {
            tasksContainer.innerHTML = '';
            
            for (let i = 0; i < myTasks.length; i++) {
                const row = document.createElement('div');
                row.className = 'task-row';

                const span = document.createElement('span');
                span.innerText = myTasks[i].name;
                if (myTasks[i].isDone) {
                    span.className = 'done';
                }

                const btnGroup = document.createElement('div');
                btnGroup.className = 'task-buttons';

                const toggleBtn = document.createElement('button');
                toggleBtn.innerText = myTasks[i].isDone ? 'Undo' : 'Complete';
                toggleBtn.style.background = '#28a745';
                toggleBtn.onclick = function() {
                    myTasks[i].isDone = !myTasks[i].isDone;
                    displayTasks();
                };

                const removeBtn = document.createElement('button');
                removeBtn.innerText = 'Delete';
                removeBtn.style.background = '#dc3545';
                removeBtn.onclick = function() {
                    myTasks.splice(i, 1);
                    displayTasks();
                };

                btnGroup.appendChild(toggleBtn);
                btnGroup.appendChild(removeBtn);
                row.appendChild(span);
                row.appendChild(btnGroup);
                tasksContainer.appendChild(row);
            }
        }

        addBtn.onclick = function() {
            const txt = taskInput.value.trim();
            if (txt === '') {
                return;
            }
            myTasks.push({ name: txt, isDone: false });
            taskInput.value = '';
            displayTasks();
        };
    </script>
</body>
</html>
